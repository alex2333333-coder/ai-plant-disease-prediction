server:
  port: 8080
  tomcat:
    max-http-form-post-size: 6MB

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/plant_disease?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  jackson:
    time-zone: Asia/Shanghai

app:
  frontendBaseUrl: ${VITE_BASE_URL:http://localhost:5173}
  rateLimit:
    recognizePerMinute: 30

