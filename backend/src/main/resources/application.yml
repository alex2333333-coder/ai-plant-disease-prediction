# 识图需要多模态 Chat API（消息里含 type=image_url）。DeepSeek 官方 deepseek-chat / deepseek-reasoner 仅文本，不能识图。
#ai:
#  vision:
#    endpoint: ${AI_VISION_ENDPOINT:https://api.openai.com/v1/chat/completions}
#    apiKey: ${AI_VISION_API_KEY:}
#    model: ${AI_VISION_MODEL:gpt-4o-mini}
#    # 为 true 时识图请求内嵌 JPEG base64（data URL），避免 MinIO 仅内网可访问时云端模型拉不到图
#    imageInlineBase64: ${AI_VISION_IMAGE_INLINE_BASE64:false}
#    # 若 model 为 deepseek-chat / deepseek-reasoner，会拒绝识图（与 endpoint 域名无关）；代理多模态时可设 skipDeepSeekTextOnlyCheck: true
ai:
  vision:
    endpoint: ${AI_VISION_ENDPOINT:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
    apiKey: ${AI_VISION_API_KEY:}
    model: ${AI_VISION_MODEL:qwen3.5-plus}
    timeoutSeconds: ${AI_VISION_TIMEOUT_SECONDS:60}
    retryCount: ${AI_VISION_RETRY_COUNT:2}
    # 识图已固定内嵌 JPEG base64；恢复「MinIO 预签名 URL 调模型」时可取消 VisionService 内相关注释并启用下行
    # imageInlineBase64: ${AI_VISION_IMAGE_INLINE_BASE64:false}
    skipDeepSeekTextOnlyCheck: ${AI_VISION_SKIP_DEEPSEEK_CHECK:false}
  prompt:
    file: ${PROMPT_FILE:prompts/doubao/plant_disease_prompt.txt}

